<!DOCTYPE html>
<html lang="th">
<head>
    <style>
        
        body {
            background-color: #e3dcd1; 
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');

            display: flex;

            margin-bottom: 20px;
            display: flex;
            align-items: center;

            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }

        /* พื้นที่เนื้อหาหลัก */
        .main-content {
            flex: 1;
            padding: 40px;
            color: #2c2c2c;
        }

        h1 { border-bottom: 2px solid #333; display: inline-block; }
        
        .terminal-text {
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-left: 5px solid #333;
        }
    </style>
</head>
<body>

    <div class="sidebar">
