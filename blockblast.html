<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>BLOCK_BLAST_FINAL_FIXED.EXE</title>
    <style>
        body {
            background-color: #fff;
            color: #000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        h2 { border: 2px solid #000; padding: 5px 20px; margin: 10px; }
        .score-box { font-weight: bold; margin-bottom: 15px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(8, 40px);
            grid-template-rows: repeat(8, 40px);
            border: 3px solid #000;
            background-color: #fff;
        }

        .cell {
            width: 40px;
            height: 40px;
            border: 0.5px solid #000;
            box-sizing: border-box;
        }

        .cell.filled { background-color: #000; }

        #spawn-area {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            min-height: 120px;
        }

        .piece-container {
            width: 120px;
            height: 120px;
            border: 1px dashed #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .piece {
            display: grid;
            position: absolute;
            cursor: grab;
            touch-action: none;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .piece.dragging {
            cursor: grabbing;
            z-index: 100;
            opacity: 0.7;
            transform: none !important;
        }

        .p-cell {
            width: 25px;
            height: 25px;
            background-color: #000;
            border: 1px solid #fff;
            box-sizing: border-box;
        }

        #game-over-ui {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <h2>[ BLOCK_BLAST.EXE ]</h2>
    <div class="score-box">SCORE: <span id="score">0000</span></div>
    
    <div class="grid" id="main-grid"></div>
    <div id="spawn-area"></div>

    <div id="game-over-ui">
        <h1 style="border: 4px solid #000; padding: 20px;">GAME OVER</h1>
        <button onclick="location.reload()" style="font-family:inherit; cursor:pointer; padding:10px 20px; margin-top:20px;">RETRY</button>
    </div>

<script>
    const GRID_SIZE = 8;
    const CELL_SIZE = 40; 
    let score = 0;
    const gridData = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
    
    const SHAPES = [
        {data: [[1, 1], [1, 1]]}, {data: [[1, 1, 1, 1]]}, {data: [[1, 1, 1], [0, 1, 0]]},
        {data: [[1, 0], [1, 0], [1, 1]]}, {data: [[1]]}, {data: [[1, 1, 1]]},
        {data: [[1], [1], [1]]}, {data: [[1, 1, 1], [1, 0, 0]]}
    ];

    function createGrid() {
        const gridEl = document.getElementById('main-grid');
        gridEl.innerHTML = '';
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell' + (gridData[r][c] ? ' filled' : '');
                gridEl.appendChild(cell);
            }
        }
    }

    function spawnPieces() {
        const area = document.getElementById('spawn-area');
        area.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            const container = document.createElement('div');
            container.className = 'piece-container';
            const shapeObj = SHAPES[Math.floor(Math.random() * SHAPES.length)];
            const piece = createPieceElement(shapeObj.data);
            container.appendChild(piece);
            area.appendChild(container);
        }
        checkGameOver();
    }

    function createPieceElement(shape) {
        const piece = document.createElement('div');
        piece.className = 'piece';
        piece.dataset.shape = JSON.stringify(shape);
        piece.style.gridTemplateColumns = `repeat(${shape[0].length}, 25px)`;
        
        shape.forEach(row => row.forEach(v => {
            const cell = document.createElement('div');
            if (v) cell.className = 'p-cell';
            piece.appendChild(cell);
        }));

        let startX, startY; 

        piece.onpointerdown = (e) => {
            piece.setPointerCapture(e.pointerId);
            piece.classList.add('dragging');
            const rect = piece.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
        };

        piece.onpointermove = (e) => {
            if (!piece.classList.contains('dragging')) return;
            const parentRect = piece.parentElement.getBoundingClientRect();
            const x = e.clientX - parentRect.left - startX;
            const y = e.clientY - parentRect.top - startY;
            piece.style.left = x + 'px';
            piece.style.top = y + 'px';
        };

        piece.onpointerup = (e) => {
            piece.classList.remove('dragging');
            const gridRect = document.getElementById('main-grid').getBoundingClientRect();
            
            // แก้ไข: ใช้ Math.floor แทน Math.round
            const c = Math.floor((e.clientX - startX - gridRect.left) / CELL_SIZE);
            const r = Math.floor((e.clientY - startY - gridRect.top) / CELL_SIZE);

            if (canPlace(shape, r, c)) {
                placeShape(shape, r, c);
                piece.parentElement.innerHTML = ''; 
                checkLines();
                createGrid();
                if (document.querySelectorAll('.piece').length === 0) {
                    spawnPieces();
                } else {
                    checkGameOver();
                }
            } else {
                piece.style.left = '50%';
                piece.style.top = '50%';
                piece.style.transform = 'translate(-50%, -50%)';
            }
        };
        return piece;
    }

    function canPlace(shape, r, c) {
        for (let i = 0; i < shape.length; i++) {
            for (let j = 0; j < shape[i].length; j++) {
                if (shape[i][j]) {
                    const tr = r + i;
                    const tc = c + j;
                    if (tr < 0 || tr >= GRID_SIZE || tc < 0 || tc >= GRID_SIZE || gridData[tr][tc]) return false;
                }
            }
        }
        return true;
    }

    function placeShape(shape, r, c) {
        shape.forEach((row, i) => row.forEach((v, j) => { 
            if (v) gridData[r + i][c + j] = 1; 
        }));
    }

    function checkLines() {
        let rowsToClear = [];
        let colsToClear = [];
        for (let i = 0; i < GRID_SIZE; i++) {
            if (gridData[i].every(v => v === 1)) rowsToClear.push(i);
            if (gridData.map(r => r[i]).every(v => v === 1)) colsToClear.push(i);
        }
        rowsToClear.forEach(r => gridData[r].fill(0));
        colsToClear.forEach(c => gridData.forEach(row => row[c] = 0));
        if (rowsToClear.length > 0 || colsToClear.length > 0) {
            score += (rowsToClear.length + colsToClear.length) * 100;
            document.getElementById('score').innerText = score.toString().padStart(4, '0');
        }
    }

    function checkGameOver() {
        const pieces = document.querySelectorAll('.piece');
        if (pieces.length === 0) return;
        let anyMovePossible = false;
        pieces.forEach(p => {
            const shape = JSON.parse(p.dataset.shape);
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (canPlace(shape, r, c)) { anyMovePossible = true; break; }
                }
                if (anyMovePossible) break;
            }
        });
        if (!anyMovePossible) {
            document.getElementById('game-over-ui').style.display = 'flex';
        }
    }

    createGrid();
    spawnPieces();
</script>
</body>
</html>
