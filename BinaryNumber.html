<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>転生</title>

<style>
body {
  background: black;
  color: #00ff00;
  font-family: monospace;
  padding: 20px;
}


#terminal {
  border: 1px solid #000000;
  padding: 15px;
  height: 300px;
  overflow-y: auto;
}


.input-line {
  display: flex;
}

.prompt {
  margin-right: 5px;
}

input {
  background: black;
  border: none;
  color: #00ff00;
  outline: none;
  font-family: monospace;
  width: 100%;
}


.cursor::after {
  content: "_";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div id="terminal"></div>

<div class="input-line">
  <span class="prompt">user@system:~$</span>
  <input id="input" autofocus class="cursor">
</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("input");


function textToBinary(text) {
  return text.split("")
    .map(c => c.charCodeAt(0).toString(2).padStart(8,"0"))
    .join(" ");
}


function typeLine(text) {
  const line = document.createElement("div");
  terminal.appendChild(line);

  let i = 0;
  const speed = 15;

  function typing() {
    if (i < text.length) {
      line.innerText += text[i];
      i++;
      setTimeout(typing, speed);
    }
  }

  typing();
}


input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const value = input.value;

    
    const command = document.createElement("div");
    command.innerText = "user@system:~$ " + value;
    terminal.appendChild(command);

    
    const binary = textToBinary(value);

    
    typeLine(binary);

    
    input.value = "";

    
    terminal.scrollTop = terminal.scrollHeight;
  }
});
</script>

</body>
</html>
